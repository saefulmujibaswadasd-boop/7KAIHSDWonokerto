<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>7KAIH Digital | SD Negeri Wonokerto</title>
<meta name="description" content="Aplikasi 7KAIH SD Negeri Wonokerto Kecamatan Leksono Kabupaten Wonosobo.">

<link rel="icon" href="assets/img/logo_sekolah.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css?v=3">

<meta name="theme-color" content="#0d6efd">

<script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- ================= LOADING ================= -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-content text-center">
    <div class="spinner-border text-light mb-3"></div>
    <h5 class="mb-3">Memuat Aplikasi 7KAIH...</h5>
    <button id="startAppBtn" class="btn btn-light btn-sm d-none">
      Mulai Aplikasi
    </button>
  </div>
</div>

<!-- ================= LOGIN ================= -->
<section id="openingScreen" class="fullscreen-center">

  <div class="login-card">

    <div class="text-center mb-4">
      <img src="assets/img/logo_sekolah.png" class="login-logo mb-3">
      <h4 class="fw-bold">7 Kebiasaan Anak Indonesia Hebat</h4>
      <small class="text-muted">SD Negeri Wonokerto</small>
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text">🎓</span>
      <input type="text" id="loginID" class="form-control login-input" placeholder="Masukkan ID Siswa">
    </div>

    <div id="loginFeedback" class="login-feedback mb-2"></div>

    <button id="loginBtn" class="btn btn-primary w-100 login-btn">
      Masuk
    </button>

    <div id="loginLoading" class="text-center mt-3 d-none">
      <div class="spinner-border spinner-border-sm text-primary"></div>
      <small class="d-block mt-2">Memverifikasi...</small>
    </div>

  </div>
</section>

<!-- ================= GREETING ================= -->
<section id="greetingScreen" class="fullscreen-center d-none">
  <div class="greeting-box text-center">
    <h3 id="greetingText"></h3>
  </div>
</section>

<!-- ================= MAIN ================= -->
<div id="mainApp" class="d-none">

<header class="app-header">
  <div class="container">
    <div class="row align-items-center text-center">

      <div class="col-3">
        <img src="assets/img/logo_pemkab.png" class="header-logo">
      </div>

      <div class="col-6">
        <h6 class="fw-bold mb-1">PEMERINTAH KABUPATEN WONOSOBO</h6>
        <h5 class="mb-1">DINAS PENDIDIKAN PEMUDA DAN OLAHRAGA</h5>
        <h4 class="fw-bold">SD NEGERI WONOKERTO</h4>
      </div>

      <div class="col-3 text-end">
        <img src="assets/img/logo_sekolah.png" class="header-logo">
      </div>

    </div>
  </div>
</header>

<main class="container my-4">
  <div class="app-card">

    <div class="progress mb-3">
      <div id="progressBar" class="progress-bar" style="width:0%"></div>
    </div>

    <h5 id="soalText" class="mb-3"></h5>

    <div class="input-group mb-2">
      <input type="text" id="jawaban" class="form-control">
      <button class="btn btn-outline-primary" id="micBtn">🎤</button>
    </div>

    <button class="btn btn-success w-100 mb-3" id="kirimBtn">
      Kirim
    </button>

    <div id="rekap"></div>

  </div>
</main>

<footer class="text-center text-muted py-3">
  <small>© 2026 SD Negeri Wonokerto</small>
</footer>

</div>

<audio id="sholawat" src="assets/audio/Sholawat.mp3" loop></audio>

<script src="assets/js/app.js?v=3"></script>

</body>
</html>
